<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

<!-- Circular Background -->
<circle cx="256" cy="256" r="240" fill="#f8fafc" stroke="#e2e8f0" stroke-width="4"/>

<!-- Center Play Button -->
<circle cx="256" cy="256" r="48" fill="#6366f1">
  <animate attributeName="r" values="46;52;46" dur="1.6s" repeatCount="indefinite"/>
</circle>

<polygon points="242,232 242,280 284,256" fill="white"/>

<!-- Rotating Editing Ring -->
<g>
  <animateTransform attributeName="transform"
                    type="rotate"
                    from="0 256 256"
                    to="360 256 256"
                    dur="10s"
                    repeatCount="indefinite"/>

  <!-- Clip Blocks -->
  <rect x="256" y="70" width="24" height="40" rx="6" fill="#22c55e"/>
  <rect x="390" y="240" width="40" height="24" rx="6" fill="#f59e0b"/>
  <rect x="230" y="390" width="24" height="40" rx="6" fill="#6366f1"/>
  <rect x="90" y="240" width="40" height="24" rx="6" fill="#ef4444"/>

</g>

<!-- Circular Timeline Ring -->
<circle cx="256" cy="256" r="150"
        fill="none"
        stroke="#cbd5e1"
        stroke-width="4"
        stroke-dasharray="12 10"/>

<!-- Spark Effects -->
<circle cx="150" cy="140" r="3" fill="#38bdf8">
  <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
</circle>

<circle cx="360" cy="150" r="3" fill="#38bdf8">
  <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
</circle>

</svg>